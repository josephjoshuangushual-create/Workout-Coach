<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Coach</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --good: #3fb950;
    --warn: #d29922;
    --bad: #f85149;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  header h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 600;
  }
  .toolbar {
    display: flex;
    gap: 8px;
  }
  button {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: var(--radius);
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }
  button:hover { background: #30363d; }
  button.primary {
    background: var(--accent);
    color: #0d1117;
    border-color: var(--accent);
    font-weight: 600;
  }
  button.primary:hover { background: #79b8ff; }
  button.danger { color: var(--bad); }
  button.ghost { background: transparent; }
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: 10px 16px;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 16px;
  }
  .card h2 {
    margin: 0 0 12px;
    font-size: 16px;
    font-weight: 600;
  }
  .recommend {
    background: linear-gradient(135deg, #1f2937 0%, #161b22 100%);
    border-color: var(--accent);
  }
  .recommend .split-name {
    font-size: 28px;
    font-weight: 700;
    margin: 6px 0;
    text-transform: capitalize;
  }
  .recommend .reason {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 14px;
  }
  .split-picker {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .split-btn {
    padding: 12px 8px;
    text-align: center;
    text-transform: capitalize;
    font-size: 14px;
  }
  .split-btn.recommended { border-color: var(--accent); }
  .muscle-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
  }
  .muscle {
    background: var(--surface-2);
    padding: 10px 12px;
    border-radius: 8px;
    border-left: 3px solid var(--border);
    font-size: 13px;
  }
  .muscle.fresh { border-left-color: var(--good); }
  .muscle.recovering { border-left-color: var(--warn); }
  .muscle.stale { border-left-color: var(--bad); }
  .muscle-name { text-transform: capitalize; font-weight: 500; }
  .muscle-days { color: var(--text-dim); font-size: 12px; }
  .exercise-list { list-style: none; padding: 0; margin: 0; }
  .superset {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 14px;
    background: rgba(88, 166, 255, 0.04);
    border-left: 3px solid var(--accent);
  }
  .superset-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
    padding: 0 4px;
  }
  .superset-label {
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .superset-muscles {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: capitalize;
  }
  .pair-pos {
    display: inline-block;
    min-width: 24px;
    background: var(--accent);
    color: #0d1117;
    font-size: 11px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 4px;
    margin-right: 6px;
    vertical-align: middle;
  }
  .exercise-item {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .superset .exercise-item:last-child { margin-bottom: 0; }
  .exercise-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .exercise-name { font-weight: 500; }
  .exercise-muscles { font-size: 12px; color: var(--text-dim); margin-top: 2px; text-transform: capitalize; }
  .sets-list { margin-top: 10px; display: none; }
  .sets-list.open { display: block; }
  .set-row {
    display: grid;
    grid-template-columns: 24px 1fr 1fr 32px;
    gap: 8px;
    align-items: center;
    margin-bottom: 6px;
  }
  .set-row label { font-size: 12px; color: var(--text-dim); }
  input[type="number"], input[type="text"] {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 8px;
    border-radius: 6px;
    font-size: 14px;
    width: 100%;
    font-family: inherit;
  }
  input:focus { outline: none; border-color: var(--accent); }
  .set-controls {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .set-controls button { padding: 4px 10px; font-size: 12px; }
  .icon-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    padding: 4px;
    cursor: pointer;
    font-size: 16px;
  }
  .empty {
    text-align: center;
    color: var(--text-dim);
    padding: 24px;
  }
  .history-item {
    background: var(--surface-2);
    padding: 12px 14px;
    border-radius: 8px;
    margin-bottom: 8px;
    cursor: pointer;
  }
  .history-date { font-weight: 500; }
  .history-meta { font-size: 13px; color: var(--text-dim); }
  .history-detail {
    margin-top: 10px;
    font-size: 13px;
    color: var(--text-dim);
    display: none;
  }
  .history-detail.open { display: block; }
  .history-detail ul { margin: 4px 0; padding-left: 18px; }
  .save-bar {
    position: sticky;
    bottom: 0;
    background: var(--bg);
    padding: 12px 0;
    border-top: 1px solid var(--border);
    margin-top: 16px;
    display: flex;
    gap: 8px;
  }
  .save-bar button { flex: 1; }
  .hidden { display: none !important; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    background: var(--surface-2);
    border-radius: 10px;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: capitalize;
  }
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: 10px 18px;
    border-radius: 8px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; }
  .rest-timer {
    background: var(--surface-2);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 16px;
    text-align: center;
  }
  .rest-timer .timer-label { font-size: 12px; color: var(--text-dim); }
  .rest-timer .timer-display {
    font-size: 36px;
    font-weight: 700;
    font-family: SF Mono, Menlo, monospace;
    color: var(--accent);
    margin: 4px 0;
  }
  .rest-timer .timer-phase { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
  .rest-timer button { padding: 4px 14px; font-size: 12px; }
  .superset.inactive { opacity: 0.55; }
  .superset.current { box-shadow: 0 0 0 1px var(--accent); }
  .set-row.current {
    background: rgba(88, 166, 255, 0.12);
    border-left: 3px solid var(--accent);
    padding-left: 6px;
    margin-left: -9px;
  }
  .set-row.done { opacity: 0.55; }
  .set-row.done input { color: var(--good); }
  .btn-done {
    background: var(--accent);
    color: #0d1117;
    border: none;
    padding: 4px 8px;
    font-size: 11px;
    font-weight: 700;
    border-radius: 4px;
    cursor: pointer;
  }
  .btn-done:hover { background: #79b8ff; }
  .set-status {
    font-size: 12px;
    color: var(--good);
    text-align: center;
  }
  .body-log-form {
    display: grid;
    gap: 10px;
  }
  .body-log-form label {
    display: flex;
    flex-direction: column;
    font-size: 13px;
    color: var(--text-dim);
    gap: 4px;
  }
  .body-log-form button { margin-top: 4px; }
  .body-log-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 12px;
    background: var(--surface-2);
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 14px;
  }
  .body-log-row .meta { color: var(--text-dim); font-size: 12px; }
  @media (max-width: 480px) {
    .split-picker { grid-template-columns: repeat(2, 1fr); }
    header h1 { font-size: 18px; }
    .tabs { overflow-x: auto; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Workout Coach</h1>
    <div class="toolbar">
      <button class="ghost" id="btn-export" title="Download history JSON">Export</button>
      <button class="ghost" id="btn-import" title="Load history JSON">Import</button>
      <input type="file" id="file-input" accept="application/json" class="hidden">
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="today">Today</button>
    <button class="tab" data-tab="history">History</button>
    <button class="tab" data-tab="recovery">Recovery</button>
    <button class="tab" data-tab="progress">Progress</button>
  </div>

  <section id="tab-today">
    <div class="card recommend" id="recommend-card"></div>
    <div class="card">
      <h2>Choose today's split</h2>
      <div class="split-picker" id="split-picker"></div>
    </div>
    <div class="card hidden" id="exercise-card">
      <h2 id="exercise-card-title">Exercises</h2>
      <div class="rest-timer hidden" id="rest-timer">
        <div class="timer-label">Rest period</div>
        <div class="timer-display" id="timer-display">00:00</div>
        <div class="timer-phase" id="timer-phase"></div>
        <button class="ghost" id="btn-skip-timer">Skip rest</button>
      </div>
      <ul class="exercise-list" id="exercise-list"></ul>
      <div class="save-bar">
        <button class="ghost" id="btn-cancel">Cancel</button>
        <button class="primary" id="btn-save">Save workout</button>
      </div>
    </div>
  </section>

  <section id="tab-history" class="hidden">
    <div class="card">
      <h2>Past workouts</h2>
      <div id="history-list"></div>
    </div>
  </section>

  <section id="tab-recovery" class="hidden">
    <div class="card">
      <h2>Muscle recovery status</h2>
      <p class="muscle-days" style="margin-top: -8px; margin-bottom: 14px;">
        <span style="color: var(--good);">●</span> Fresh (3+ days)
        &nbsp;<span style="color: var(--warn);">●</span> Recovering (1-2 days)
        &nbsp;<span style="color: var(--bad);">●</span> Hit today
      </p>
      <div class="muscle-grid" id="muscle-grid"></div>
    </div>
  </section>

  <section id="tab-progress" class="hidden">
    <div class="card">
      <h2>Log a body measurement</h2>
      <div class="body-log-form">
        <label>Weight (kg)
          <input type="number" id="body-weight" min="0" step="0.1" placeholder="e.g. 78.5">
        </label>
        <label>Body fat % (optional)
          <input type="number" id="body-fat" min="0" max="100" step="0.1" placeholder="e.g. 18.2">
        </label>
        <label>Waist (cm, optional)
          <input type="number" id="body-waist" min="0" step="0.1" placeholder="e.g. 86">
        </label>
        <label>Notes (optional)
          <input type="text" id="body-notes" placeholder="e.g. morning, post-workout">
        </label>
        <button class="primary" id="btn-log-body">Save entry</button>
      </div>
    </div>
    <div class="card">
      <h2>Progress history</h2>
      <div id="body-log-list"></div>
    </div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// Exercise library — primary muscle first, secondary after
// ============================================================
// Each split is a list of supersets. Each superset is a [A, B] pair —
// you alternate between A and B with minimal rest between, then rest.
// Splits use TRUE antagonist pairing: chest/back, shoulders/arms, quads/hams.
const LIBRARY = {
  // Upper A — Chest vs Back, true horizontal push/pull antagonist
  "upper-a": [
    [
      { name: "Flat Barbell Bench Press", muscles: ["chest", "triceps", "shoulders"], defaultSets: 4, defaultReps: 8 },
      { name: "Barbell Row", muscles: ["back", "biceps"], defaultSets: 4, defaultReps: 8 },
    ],
    [
      { name: "Incline Barbell Bench Press", muscles: ["chest", "shoulders", "triceps"], defaultSets: 4, defaultReps: 8 },
      { name: "T-Bar Row", muscles: ["back", "biceps"], defaultSets: 4, defaultReps: 10 },
    ],
    [
      { name: "Incline Dumbbell Press", muscles: ["chest", "shoulders", "triceps"], defaultSets: 3, defaultReps: 10 },
      { name: "Single Arm Row", muscles: ["back", "biceps"], defaultSets: 3, defaultReps: 10 },
    ],
    [
      { name: "Pec Deck", muscles: ["chest"], defaultSets: 3, defaultReps: 12 },
      { name: "Chest-Supported Row", muscles: ["back", "biceps"], defaultSets: 3, defaultReps: 10 },
    ],
    [
      { name: "Cable Fly", muscles: ["chest"], defaultSets: 3, defaultReps: 12 },
      { name: "Lat Pulldown", muscles: ["back", "biceps"], defaultSets: 3, defaultReps: 10 },
    ],
    [
      { name: "Dumbbell Chest Fly", muscles: ["chest"], defaultSets: 3, defaultReps: 12 },
      { name: "Single Arm Lat Pulldown", muscles: ["back", "biceps"], defaultSets: 3, defaultReps: 10 },
    ],
    [
      { name: "Dips", muscles: ["chest", "triceps"], defaultSets: 3, defaultReps: 8 },
      { name: "Pull-ups", muscles: ["back", "biceps"], defaultSets: 3, defaultReps: 6 },
    ],
  ],
  // Upper B — Shoulders & Arms: front/rear delt antagonist, then bi/tri antagonist
  "upper-b": [
    [
      { name: "Shoulder Press", muscles: ["shoulders", "triceps"], defaultSets: 4, defaultReps: 8 },
      { name: "Face Pulls", muscles: ["rear-delts", "back"], defaultSets: 4, defaultReps: 15 },
    ],
    [
      { name: "Lateral Raises", muscles: ["shoulders"], defaultSets: 4, defaultReps: 12 },
      { name: "Reverse Pec Deck", muscles: ["rear-delts"], defaultSets: 4, defaultReps: 12 },
    ],
    [
      { name: "Overhead Dumbbell Press", muscles: ["shoulders", "triceps"], defaultSets: 3, defaultReps: 10 },
      { name: "Reverse Dumbbell Fly", muscles: ["rear-delts"], defaultSets: 3, defaultReps: 12 },
    ],
    [
      { name: "Tricep Pushdowns", muscles: ["triceps"], defaultSets: 3, defaultReps: 12 },
      { name: "Preacher Curls", muscles: ["biceps"], defaultSets: 3, defaultReps: 10 },
    ],
    [
      { name: "Tricep Extensions", muscles: ["triceps"], defaultSets: 3, defaultReps: 12 },
      { name: "Hammer Curls", muscles: ["biceps"], defaultSets: 3, defaultReps: 10 },
    ],
    [
      { name: "Overhead Cable Fly", muscles: ["triceps"], defaultSets: 3, defaultReps: 12 },
      { name: "Cable Curls", muscles: ["biceps"], defaultSets: 3, defaultReps: 12 },
    ],
    [
      { name: "Push-ups", muscles: ["chest", "triceps", "shoulders"], defaultSets: 3, defaultReps: 15 },
      { name: "Single Arm Bicep Curls", muscles: ["biceps"], defaultSets: 3, defaultReps: 10 },
    ],
  ],
  // Lower — Quads vs Hamstrings/Glutes, true antagonist
  lower: [
    [
      { name: "Squats", muscles: ["quads", "glutes", "hamstrings"], defaultSets: 4, defaultReps: 8 },
      { name: "Romanian Deadlift", muscles: ["hamstrings", "glutes"], defaultSets: 4, defaultReps: 8 },
    ],
    [
      { name: "Leg Press", muscles: ["quads", "glutes", "hamstrings"], defaultSets: 4, defaultReps: 10 },
      { name: "Hip Thrust", muscles: ["glutes", "hamstrings"], defaultSets: 4, defaultReps: 10 },
    ],
    [
      { name: "Leg Extensions", muscles: ["quads"], defaultSets: 3, defaultReps: 12 },
      { name: "Leg Curls", muscles: ["hamstrings"], defaultSets: 3, defaultReps: 12 },
    ],
    [
      { name: "Bulgarian Split Squats", muscles: ["quads", "glutes"], defaultSets: 3, defaultReps: 10 },
      { name: "Nordic Curls", muscles: ["hamstrings"], defaultSets: 3, defaultReps: 6 },
    ],
    [
      { name: "High Box Step Ups", muscles: ["quads", "glutes"], defaultSets: 3, defaultReps: 8 },
      { name: "Deadlifts (Conventional)", muscles: ["back", "hamstrings", "glutes"], defaultSets: 3, defaultReps: 5 },
    ],
    [
      { name: "Adductors", muscles: ["quads", "glutes"], defaultSets: 3, defaultReps: 15 },
      { name: "Abductors", muscles: ["glutes"], defaultSets: 3, defaultReps: 15 },
    ],
    [
      { name: "Standing Calf Raises", muscles: ["calves"], defaultSets: 4, defaultReps: 12 },
      { name: "Seated Calf Raises", muscles: ["calves"], defaultSets: 3, defaultReps: 15 },
    ],
  ],
  "full-body": [
    [
      { name: "Squats", muscles: ["quads", "glutes", "hamstrings"], defaultSets: 3, defaultReps: 8 },
      { name: "Pull-ups", muscles: ["back", "biceps"], defaultSets: 3, defaultReps: 6 },
    ],
    [
      { name: "Deadlifts", muscles: ["back", "hamstrings", "glutes", "quads"], defaultSets: 3, defaultReps: 5 },
      { name: "Planks", muscles: ["core"], defaultSets: 3, defaultReps: 30 },
    ],
    [
      { name: "Cable Crunch", muscles: ["core"], defaultSets: 3, defaultReps: 12 },
      { name: "Pallof Press", muscles: ["core"], defaultSets: 3, defaultReps: 10 },
    ],
    [
      { name: "Decline Situps", muscles: ["core"], defaultSets: 3, defaultReps: 12 },
      { name: "Leg Raises", muscles: ["core"], defaultSets: 3, defaultReps: 10 },
    ],
  ],
};

const SPLIT_MUSCLES = {
  "upper-a": ["chest", "back", "biceps", "triceps"],
  "upper-b": ["shoulders", "rear-delts", "biceps", "triceps"],
  lower: ["quads", "hamstrings", "glutes", "calves"],
  "full-body": ["chest", "back", "shoulders", "quads", "hamstrings", "glutes", "core"],
};

const SPLIT_LABELS = {
  "upper-a": "Upper A — Chest & Back",
  "upper-b": "Upper B — Shoulders & Arms",
  lower: "Lower",
  "full-body": "Full Body",
};

const SPLIT_SHORT = {
  "upper-a": "Upper A",
  "upper-b": "Upper B",
  lower: "Lower",
  "full-body": "Full Body",
};

const ALL_SPLITS = ["upper-a", "upper-b", "lower", "full-body"];

const ALL_MUSCLES = [
  "chest", "back", "shoulders", "biceps", "triceps",
  "rear-delts", "quads", "hamstrings", "glutes", "calves", "core",
];

// ============================================================
// State
// ============================================================
const STORAGE_KEY = "workout-coach-v1";
let state = loadState();
let workInProgress = null; // { split, exercises: [{ name, muscles, sets: [{reps, weight}] }] }
let currentTab = "today";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // Migrate: ensure bodyLogs array exists
      if (!parsed.bodyLogs) parsed.bodyLogs = [];
      return parsed;
    }
  } catch (e) { console.warn("Failed to load state", e); }
  return { workouts: [], bodyLogs: [] };
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ============================================================
// Recovery logic
// ============================================================
function daysSince(isoDate) {
  const ms = Date.now() - new Date(isoDate).getTime();
  return ms / (1000 * 60 * 60 * 24);
}

function muscleLastTrained() {
  // returns { muscle: daysAgo or Infinity }
  const result = {};
  for (const m of ALL_MUSCLES) result[m] = Infinity;
  for (const w of state.workouts) {
    const days = daysSince(w.date);
    for (const ex of w.exercises) {
      for (const m of ex.muscles) {
        if (days < result[m]) result[m] = days;
      }
    }
  }
  return result;
}

function recommendSplit() {
  const lastTrained = muscleLastTrained();
  // Score each split by the MOST-STALE muscle (min days-since). The most
  // recently-trained muscle in a split dictates whether that split is ready.
  // This avoids picking a split where one muscle was hit yesterday just
  // because other muscles in the split are very stale.
  const scores = {};
  for (const [split, muscles] of Object.entries(SPLIT_MUSCLES)) {
    const days = muscles.map(m => Math.min(lastTrained[m], 14));
    const minDays = Math.min(...days);
    // Hard penalty if the most-stale muscle was hit < 1.5 days ago
    const tooRecent = minDays < 1.5;
    scores[split] = tooRecent ? minDays - 5 : minDays;
  }
  let best = "upper-a", bestScore = -Infinity;
  for (const [s, v] of Object.entries(scores)) {
    if (v > bestScore) { bestScore = v; best = s; }
  }
  return { split: best, scores, lastTrained };
}

function muscleStatus(daysAgo) {
  if (daysAgo === Infinity) return { label: "never", class: "fresh" };
  if (daysAgo < 1) return { label: "today", class: "stale" };
  if (daysAgo < 3) return { label: `${Math.floor(daysAgo)}d ago`, class: "recovering" };
  if (daysAgo < 14) return { label: `${Math.floor(daysAgo)}d ago`, class: "fresh" };
  return { label: "2w+ ago", class: "fresh" };
}

// ============================================================
// Rendering
// ============================================================
function render() {
  renderRecommendation();
  renderSplitPicker();
  renderExerciseCard();
  renderHistory();
  renderRecovery();
  renderProgress();
}

function renderProgress() {
  const list = document.getElementById("body-log-list");
  if (!list) return;
  if (!state.bodyLogs || state.bodyLogs.length === 0) {
    list.innerHTML = `<div class="empty">No measurements logged yet.</div>`;
    return;
  }
  // Sort newest first
  const sorted = [...state.bodyLogs].sort((a, b) => new Date(b.date) - new Date(a.date));
  list.innerHTML = sorted.map(entry => {
    const date = new Date(entry.date);
    const dateStr = date.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    const bits = [];
    if (entry.weight != null) bits.push(`<strong>${entry.weight} kg</strong>`);
    if (entry.bodyFat != null) bits.push(`${entry.bodyFat}% BF`);
    if (entry.waist != null) bits.push(`waist ${entry.waist}cm`);
    return `
      <div class="body-log-row">
        <div>
          <div>${bits.join(" · ") || "(no values)"}</div>
          ${entry.notes ? `<div class="meta">${entry.notes}</div>` : ""}
        </div>
        <div class="meta">
          ${dateStr}
          <button class="icon-btn danger" data-delete-body="${entry.id}" title="Delete">×</button>
        </div>
      </div>
    `;
  }).join("");
  document.querySelectorAll("[data-delete-body]").forEach(btn => {
    btn.onclick = () => {
      const id = btn.dataset.deleteBody;
      if (!confirm("Delete this entry?")) return;
      state.bodyLogs = state.bodyLogs.filter(e => e.id !== id);
      saveState();
      renderProgress();
    };
  });
}

function logBodyEntry() {
  const weight = parseFloat(document.getElementById("body-weight").value);
  const bodyFat = parseFloat(document.getElementById("body-fat").value);
  const waist = parseFloat(document.getElementById("body-waist").value);
  const notes = document.getElementById("body-notes").value.trim();
  if (isNaN(weight) && isNaN(bodyFat) && isNaN(waist)) {
    toast("Enter at least one value before saving.");
    return;
  }
  const entry = {
    id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
    date: new Date().toISOString(),
    weight: isNaN(weight) ? null : weight,
    bodyFat: isNaN(bodyFat) ? null : bodyFat,
    waist: isNaN(waist) ? null : waist,
    notes,
  };
  state.bodyLogs.push(entry);
  saveState();
  document.getElementById("body-weight").value = "";
  document.getElementById("body-fat").value = "";
  document.getElementById("body-waist").value = "";
  document.getElementById("body-notes").value = "";
  renderProgress();
  toast("Measurement logged.");
}

function renderRecommendation() {
  const { split, lastTrained } = recommendSplit();
  const muscles = SPLIT_MUSCLES[split];
  const muscleSummary = muscles.map(m => {
    const d = lastTrained[m];
    return d === Infinity ? `${m} (never)` : `${m} (${Math.floor(d)}d)`;
  }).join(", ");
  const reason = state.workouts.length === 0
    ? "No history yet — pick any split to start."
    : `Most-stale muscle in this split is ready. Last trained: ${muscleSummary}.`;
  document.getElementById("recommend-card").innerHTML = `
    <div style="color: var(--text-dim); font-size: 13px;">Suggested for today</div>
    <div class="split-name">${SPLIT_LABELS[split]}</div>
    <div class="reason">${reason}</div>
    <button class="primary" id="btn-start-recommended">Start ${SPLIT_SHORT[split]} workout</button>
  `;
  document.getElementById("btn-start-recommended").onclick = () => startWorkout(split);
}

function renderSplitPicker() {
  const { split: recommended } = recommendSplit();
  document.getElementById("split-picker").innerHTML = ALL_SPLITS.map(s => `
    <button class="split-btn ${s === recommended ? "recommended" : ""}" data-split="${s}">
      ${SPLIT_SHORT[s]}
    </button>
  `).join("");
  document.querySelectorAll(".split-btn").forEach(btn => {
    btn.onclick = () => startWorkout(btn.dataset.split);
  });
}

function startWorkout(split) {
  const pairs = LIBRARY[split];
  workInProgress = {
    split,
    exercises: pairs.flatMap((pair, pairIdx) =>
      pair.map((ex, posIdx) => ({
        name: ex.name,
        muscles: ex.muscles,
        defaultSets: ex.defaultSets,
        defaultReps: ex.defaultReps,
        // Prefill all sets — user can edit reps/weight then tap Done
        sets: Array.from({ length: ex.defaultSets }, () => ({
          reps: ex.defaultReps,
          weight: null,
          completed: false,
        })),
        included: true,
        pairKey: String.fromCharCode(65 + pairIdx),
        pairPos: posIdx,
      }))
    ),
  };
  // Reset progression state to the very first set of Superset A
  currentWorkoutState = { pairIdx: 0, posInPair: 0, setIdx: 0, finished: false };
  stopRestTimer();
  renderExerciseCard();
  document.getElementById("exercise-card").scrollIntoView({ behavior: "smooth", block: "start" });
}

// Tracks which set the user is currently on (the "live" set with a Done button)
let currentWorkoutState = { pairIdx: 0, posInPair: 0, setIdx: 0, finished: true };

function exerciseAt(pairIdx, posInPair) {
  // exercises are flat A1,A2,B1,B2,... → linear index
  return workInProgress.exercises[pairIdx * 2 + posInPair];
}

function isCurrentSet(pairKey, pairPos, setIdx) {
  const s = currentWorkoutState;
  if (s.finished) return false;
  const curPairKey = String.fromCharCode(65 + s.pairIdx);
  return curPairKey === pairKey && s.posInPair === pairPos && s.setIdx === setIdx;
}

function advanceWorkoutState() {
  const s = currentWorkoutState;
  const partner = exerciseAt(s.pairIdx, 1 - s.posInPair);
  const totalPairs = workInProgress.exercises.length / 2;

  if (s.posInPair === 0) {
    // Just finished A → move to B (same set number, partner might have fewer sets)
    const targetSet = Math.min(s.setIdx, partner.sets.length - 1);
    currentWorkoutState = { pairIdx: s.pairIdx, posInPair: 1, setIdx: targetSet, finished: false };
    startRestTimer(20, "to-b");
    return;
  }
  // Just finished B → either next round in same superset, or next superset
  const nextSetIdx = s.setIdx + 1;
  const aSets = exerciseAt(s.pairIdx, 0).sets.length;
  const bSets = exerciseAt(s.pairIdx, 1).sets.length;
  if (nextSetIdx < Math.max(aSets, bSets)) {
    const targetA = Math.min(nextSetIdx, aSets - 1);
    currentWorkoutState = { pairIdx: s.pairIdx, posInPair: 0, setIdx: targetA, finished: false };
    startRestTimer(45, "next-round");
    return;
  }
  // Superset complete → next superset
  const nextPair = s.pairIdx + 1;
  if (nextPair < totalPairs) {
    currentWorkoutState = { pairIdx: nextPair, posInPair: 0, setIdx: 0, finished: false };
    startRestTimer(45, "next-superset");
    return;
  }
  // All supersets done
  currentWorkoutState = { pairIdx: 0, posInPair: 0, setIdx: 0, finished: true };
  stopRestTimer();
  toast("🎉 All supersets done — hit Save workout.");
}

function renderExerciseCard() {
  const card = document.getElementById("exercise-card");
  if (!workInProgress) {
    card.classList.add("hidden");
    return;
  }
  card.classList.remove("hidden");
  const totalPairs = workInProgress.exercises.length / 2;
  const cur = currentWorkoutState;
  const progressLabel = cur.finished
    ? "all supersets done — Save workout"
    : `superset ${cur.pairIdx + 1}/${totalPairs}, set ${cur.setIdx + 1}`;
  document.getElementById("exercise-card-title").textContent =
    `${SPLIT_LABELS[workInProgress.split]} — ${progressLabel}`;

  // Group exercises by pairKey
  const groups = {};
  workInProgress.exercises.forEach((ex, idx) => {
    (groups[ex.pairKey] = groups[ex.pairKey] || []).push({ ex, idx });
  });

  const list = document.getElementById("exercise-list");
  list.innerHTML = Object.entries(groups).map(([pairKey, entries], groupIdx) => {
    const muscleSummary = [...new Set(entries.flatMap(e => e.ex.muscles))].join(" · ");
    const isCurrentPair = !cur.finished && groupIdx === cur.pairIdx;
    const isPastPair = !cur.finished && groupIdx < cur.pairIdx;
    const cls = isCurrentPair ? "current" : (isPastPair ? "" : (cur.finished ? "" : "inactive"));
    return `
      <li class="superset ${cls}">
        <div class="superset-header">
          <span class="superset-label">Superset ${pairKey}${isCurrentPair ? " ▸" : ""}</span>
          <span class="superset-muscles">${muscleSummary}</span>
        </div>
        ${entries.map(({ ex, idx }) => `
          <div class="exercise-item">
            <div class="exercise-header">
              <div>
                <div class="exercise-name">
                  <span class="pair-pos">${pairKey}${ex.pairPos + 1}</span>
                  ${ex.name}
                </div>
                <div class="exercise-muscles">${ex.muscles.join(" · ")}</div>
              </div>
            </div>
            <div class="sets-list open" id="sets-${idx}">
              ${renderSets(ex, idx)}
              <div class="set-controls">
                <button data-add-set="${idx}">+ Add set</button>
              </div>
            </div>
          </div>
        `).join("")}
      </li>
    `;
  }).join("");
  attachExerciseHandlers();
}

function renderSets(ex, exIdx) {
  if (ex.sets.length === 0) {
    return `<div style="font-size: 12px; color: var(--text-dim); margin-bottom: 6px;">No sets yet.</div>`;
  }
  return ex.sets.map((s, sIdx) => {
    const cur = isCurrentSet(ex.pairKey, ex.pairPos, sIdx);
    const done = s.completed === true;
    const rowCls = cur ? "current" : (done ? "done" : "");
    const disabled = done ? "disabled" : "";
    const lastCell = done
      ? `<span class="set-status">✓</span>`
      : cur
        ? `<button class="btn-done" data-done="${exIdx}:${sIdx}">✓ Done</button>`
        : `<button class="icon-btn" data-remove-set="${exIdx}:${sIdx}" title="Remove set">×</button>`;
    return `
      <div class="set-row ${rowCls}">
        <label>${sIdx + 1}</label>
        <input type="number" min="0" step="1" placeholder="reps" value="${s.reps ?? ""}" data-field="reps" data-ex="${exIdx}" data-set="${sIdx}" ${disabled}>
        <input type="number" min="0" step="0.5" placeholder="weight" value="${s.weight ?? ""}" data-field="weight" data-ex="${exIdx}" data-set="${sIdx}" ${disabled}>
        ${lastCell}
      </div>
    `;
  }).join("");
}

function attachExerciseHandlers() {
  document.querySelectorAll("[data-add-set]").forEach(btn => {
    btn.onclick = () => {
      const idx = +btn.dataset.addSet;
      const ex = workInProgress.exercises[idx];
      const last = ex.sets[ex.sets.length - 1];
      ex.sets.push({
        reps: last?.reps ?? ex.defaultReps,
        weight: last?.weight ?? null,
        completed: false,
      });
      renderExerciseCard();
    };
  });
  document.querySelectorAll("[data-remove-set]").forEach(btn => {
    btn.onclick = () => {
      const [exIdx, sIdx] = btn.dataset.removeSet.split(":").map(Number);
      workInProgress.exercises[exIdx].sets.splice(sIdx, 1);
      renderExerciseCard();
    };
  });
  document.querySelectorAll("[data-field]").forEach(input => {
    input.oninput = () => {
      const exIdx = +input.dataset.ex;
      const sIdx = +input.dataset.set;
      const field = input.dataset.field;
      const val = input.value === "" ? null : Math.max(0, parseFloat(input.value));
      workInProgress.exercises[exIdx].sets[sIdx][field] = val;
    };
  });
  document.querySelectorAll("[data-done]").forEach(btn => {
    btn.onclick = () => {
      const [exIdx, sIdx] = btn.dataset.done.split(":").map(Number);
      workInProgress.exercises[exIdx].sets[sIdx].completed = true;
      advanceWorkoutState();
      renderExerciseCard();
    };
  });
}

function saveWorkout() {
  if (!workInProgress) return;
  // Keep only exercises with at least one completed set — incomplete supersets
  // don't count toward recovery tracking.
  const completed = workInProgress.exercises
    .map(ex => ({
      ...ex,
      sets: ex.sets.filter(s => s.completed),
    }))
    .filter(ex => ex.sets.length > 0);
  if (completed.length === 0) {
    toast("Mark at least one set as Done before saving.");
    return;
  }
  const workout = {
    id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
    date: new Date().toISOString(),
    split: workInProgress.split,
    exercises: completed.map(ex => ({
      name: ex.name,
      muscles: ex.muscles,
      sets: ex.sets.map(s => ({ reps: s.reps, weight: s.weight })),
    })),
  };
  state.workouts.unshift(workout);
  saveState();
  workInProgress = null;
  stopRestTimer();
  render();
  toast("Workout saved.");
  switchTab("today");
}

function renderHistory() {
  const list = document.getElementById("history-list");
  if (state.workouts.length === 0) {
    list.innerHTML = `<div class="empty">No workouts logged yet.</div>`;
    return;
  }
  list.innerHTML = state.workouts.map(w => {
    const totalSets = w.exercises.reduce((sum, ex) => sum + ex.sets.length, 0);
    const date = new Date(w.date);
    const dateStr = date.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
    const splitLabel = SPLIT_SHORT[w.split] || w.split.replace("-", " ");
    return `
      <div class="history-item" data-id="${w.id}">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div>
            <div class="history-date">${dateStr} <span class="badge">${splitLabel}</span></div>
            <div class="history-meta">${w.exercises.length} exercises · ${totalSets} sets</div>
          </div>
          <button class="icon-btn danger" data-delete="${w.id}" title="Delete">×</button>
        </div>
        <div class="history-detail" id="detail-${w.id}">
          <ul>
            ${w.exercises.map(ex => `
              <li><strong>${ex.name}</strong>: ${ex.sets.map(s => `${s.reps ?? "?"}${s.weight ? ` @ ${s.weight}` : ""}`).join(", ")}</li>
            `).join("")}
          </ul>
        </div>
      </div>
    `;
  }).join("");
  document.querySelectorAll(".history-item").forEach(item => {
    item.onclick = (e) => {
      if (e.target.closest("[data-delete]")) return;
      document.getElementById(`detail-${item.dataset.id}`).classList.toggle("open");
    };
  });
  document.querySelectorAll("[data-delete]").forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const id = btn.dataset.delete;
      if (!confirm("Delete this workout?")) return;
      state.workouts = state.workouts.filter(w => w.id !== id);
      saveState();
      render();
    };
  });
}

function renderRecovery() {
  const last = muscleLastTrained();
  document.getElementById("muscle-grid").innerHTML = ALL_MUSCLES.map(m => {
    const status = muscleStatus(last[m]);
    return `
      <div class="muscle ${status.class}">
        <div class="muscle-name">${m.replace("-", " ")}</div>
        <div class="muscle-days">${status.label}</div>
      </div>
    `;
  }).join("");
}

// ============================================================
// Rest timer
// ============================================================
let restTimerHandle = null;
let restTimerEndsAt = 0;

function stopRestTimer() {
  if (restTimerHandle) {
    clearInterval(restTimerHandle);
    restTimerHandle = null;
  }
  const box = document.getElementById("rest-timer");
  if (box) box.classList.add("hidden");
}

function startRestTimer(seconds, phase) {
  stopRestTimer();
  restTimerEndsAt = Date.now() + seconds * 1000;
  const box = document.getElementById("rest-timer");
  const display = document.getElementById("timer-display");
  const phaseEl = document.getElementById("timer-phase");
  box.classList.remove("hidden");
  const phaseText = {
    "to-b": `Rest ${seconds}s — switch to exercise B`,
    "next-round": `Rest ${seconds}s — next round (back to A)`,
    "next-superset": `Rest ${seconds}s — next superset starts`,
  }[phase] || `Rest ${seconds}s`;
  phaseEl.textContent = phaseText;
  const tick = () => {
    const remaining = Math.max(0, Math.ceil((restTimerEndsAt - Date.now()) / 1000));
    display.textContent = `${String(Math.floor(remaining / 60)).padStart(2, "0")}:${String(remaining % 60).padStart(2, "0")}`;
    if (remaining <= 0) {
      stopRestTimer();
      try { new Audio("data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=").play().catch(() => {}); } catch (e) {}
      toast("Time to go!");
    }
  };
  tick();
  restTimerHandle = setInterval(tick, 250);
}

// ============================================================
// Tabs, import/export, toast
// ============================================================
function switchTab(name) {
  currentTab = name;
  document.querySelectorAll(".tab").forEach(t => {
    t.classList.toggle("active", t.dataset.tab === name);
  });
  ["today", "history", "recovery", "progress"].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle("hidden", t !== name);
  });
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `workout-history-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast("Exported.");
}

function importJSON(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.workouts || !Array.isArray(parsed.workouts)) throw new Error("Invalid format");
      if (!confirm(`Replace current data with ${parsed.workouts.length} workouts from file?`)) return;
      state = parsed;
      saveState();
      render();
      toast("Imported.");
    } catch (err) {
      toast("Import failed: " + err.message);
    }
  };
  reader.readAsText(file);
}

// ============================================================
// Wire up
// ============================================================
document.querySelectorAll(".tab").forEach(t => {
  t.onclick = () => switchTab(t.dataset.tab);
});
document.getElementById("btn-export").onclick = exportJSON;
document.getElementById("btn-import").onclick = () => document.getElementById("file-input").click();
document.getElementById("file-input").onchange = (e) => {
  if (e.target.files[0]) importJSON(e.target.files[0]);
  e.target.value = "";
};
document.getElementById("btn-save").onclick = saveWorkout;
document.getElementById("btn-cancel").onclick = () => {
  if (!workInProgress) return;
  if (confirm("Discard this workout?")) {
    workInProgress = null;
    stopRestTimer();
    renderExerciseCard();
  }
};
document.getElementById("btn-skip-timer").onclick = stopRestTimer;
document.getElementById("btn-log-body").onclick = logBodyEntry;

render();
</script>
</body>
